<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Bookshop</title>
    <!-- Google Fonts Inter + Material Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- Общие стили -->
    <link rel="stylesheet" href="/static/base.css">
    <link rel="stylesheet" href="/static/components.css">
    <!-- Стили для страницы входа -->
    <link rel="stylesheet" href="/static/auth.css">
</head>
<body>
    <main class="auth-page" aria-labelledby="auth-heading">
        <div class="auth-card">
            <header class="auth-header">
                <h1 id="auth-heading" class="auth-title">Добро пожаловать!</h1>
                <p class="auth-subtitle">Войдите в свой аккаунт</p>
            </header>

            <form class="auth-form" method="post" action="/root/authorization" aria-label="Форма входа">
                <!-- CSRF токен (если нужен) -->
                <!-- <input type="hidden" name="csrf_token" value="..."> -->

                <div class="input-group">
                    <span class="material-icons input-icon" aria-hidden="true">email</span>
                    <input type="email" id="email" name="email" class="form-input"
                           placeholder="Email" required autocomplete="email" aria-required="true">
                    <label for="email" class="input-label">Email</label>
                </div>

                <div class="input-group">
                    <span class="material-icons input-icon" aria-hidden="true">lock</span>
                    <input type="password" id="password" name="password" class="form-input"
                           placeholder="Пароль" minlength="8" maxlength="50"
                           required autocomplete="current-password" aria-required="true">
                    <label for="password" class="input-label">Пароль</label>
                    <button type="button" class="password-toggle"
                            aria-label="Показать пароль" title="Показать пароль">
                        <span class="material-icons" aria-hidden="true">visibility_off</span>
                    </button>
                </div>

                <div class="auth-options">
                    <div class="checkbox-group">
                        <input type="checkbox" id="remember" name="remember" class="form-check-input">
                        <label for="remember" class="form-check-label">Запомнить меня</label>
                    </div>
                    <a href="/root/forgot-password" class="forgot-link">Забыли пароль?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                    Войти
                    <span class="material-icons btn-icon" aria-hidden="true">arrow_forward</span>
                </button>
            </form>

            <footer class="auth-footer">
                <p>Нет аккаунта? <a href="/root/sign_up">Зарегистрироваться</a></p>
            </footer>
        </div>
    </main>

    <!-- Скрипт для показа пароля -->
    <script>
    document.querySelectorAll('.password-toggle').forEach(btn => {
        btn.addEventListener('click', function() {
            // Находим ближайший контейнер с полем
            const group = this.closest('.input-group');
            // Ищем внутри контейнера поле ввода (пароль или текст)
            const input = group.querySelector('input[type="password"], input[type="text"]');
            const icon = this.querySelector('.material-icons');

            if (input && icon) {
                const isPassword = input.type === 'password';
                input.type = isPassword ? 'text' : 'password';
                icon.textContent = isPassword ? 'visibility' : 'visibility_off';
            }
        });
    });
</script>
<script>
    (function() {
        const form = document.querySelector('.auth-form');
        if (!form) return;

        form.addEventListener('submit', async (event) => {
            event.preventDefault(); // Отменяем стандартную отправку

            // Собираем данные формы
            const formData = new FormData(form);
            const data = {
                email: formData.get('email'),
                password: formData.get('password'),
                remember: formData.has('remember') && formData.get('remember') === 'on' // true/false
            };

            // Если используется CSRF токен (раскомментируйте и добавьте поле в форму)
            // const csrfToken = formData.get('csrf_token');
            // if (csrfToken) data.csrf_token = csrfToken;

            try {
                const response = await fetch('/root/authorization', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        // Если нужен CSRF, добавьте соответствующий заголовок
                        // 'X-CSRF-TOKEN': csrfToken
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    // Успешный вход – выполняем редирект (обычно сервер возвращает URL или куки)
                    // Можно либо перейти по заголовку Location, либо на главную
                    const result = await response.json().catch(() => ({}));
                    if (result.redirect_url) {
                        window.location.href = result.redirect_url;
                    } else {
                        // Перенаправление на главную (или другую страницу по умолчанию)
                        window.location.href = '/';
                    }
                } else {
                    // Обработка ошибок (статус 4xx, 5xx)
                    const errorData = await response.json().catch(() => ({ detail: 'Ошибка сервера' }));
                    let errorMessage = 'Ошибка входа. ';
                    if (errorData.detail) {
                        if (Array.isArray(errorData.detail)) {
                            errorMessage += errorData.detail.map(err => err.msg).join('; ');
                        } else if (typeof errorData.detail === 'string') {
                            errorMessage += errorData.detail;
                        }
                    }
                    alert(errorMessage);
                }
            } catch (error) {
                console.error('Ошибка сети:', error);
                alert('Не удалось отправить запрос. Проверьте соединение.');
            }
        });
    })();
</script>

</body>
</html>
